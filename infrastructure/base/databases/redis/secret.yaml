# Senha do Redis. Substituir antes do deploy:
#   kubectl -n databases create secret generic redis-credentials \
#     --from-literal=REDIS_PASSWORD=$(openssl rand -base64 32) \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: databases
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"
