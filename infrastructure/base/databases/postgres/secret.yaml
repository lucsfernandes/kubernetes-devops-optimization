# Placeholder do Secret de credenciais do Postgres.
#
# Contém:
#   - POSTGRES_USER         (superuser)
#   - POSTGRES_PASSWORD     (senha do superuser)
#   - POSTGRES_DB           (banco padrão criado no boot)
#   - APP_*_PASSWORD        (senhas dos usuários de aplicação)
#
# Substituir antes do deploy. Exemplo:
#   kubectl -n databases create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 32) \
#     --from-literal=POSTGRES_DB=postgres \
#     --from-literal=APP_N8N_PASSWORD=$(openssl rand -base64 24) \
#     --from-literal=APP_EVOLUTION_PASSWORD=$(openssl rand -base64 24) \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: databases
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"
  POSTGRES_DB: "postgres"
  APP_N8N_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"
  APP_EVOLUTION_PASSWORD: "CHANGE_ME_TO_A_STRONG_PASSWORD"
