# Service ClusterIP do Postgres.
# DNS interno:
#   postgres.databases.svc.cluster.local:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: databases
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  type: ClusterIP
  clusterIP: None  # headless — necessário para StatefulSet
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
# Service ClusterIP "padrão" (estável) para clients que não querem DNS de pod.
apiVersion: v1
kind: Service
metadata:
  name: postgres-rw
  namespace: databases
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
