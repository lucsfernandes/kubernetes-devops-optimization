# n8n webhook — processo separado SOMENTE para receber webhooks externos
# e enfileirá-los no Redis. Mantém o `main` desafogado e permite escalar
# webhooks horizontalmente.
#
# Não usa PVC (stateless) — pode ter múltiplas réplicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-webhook
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: webhook
        app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: n8nio/n8n:1.66.0
          imagePullPolicy: IfNotPresent
          # `n8n webhook` é o subcomando oficial para o processo de webhook.
          command: ["n8n"]
          args: ["webhook"]
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secrets
          env:
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "false"   # webhooks são públicos por definição
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
