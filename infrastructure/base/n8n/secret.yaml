# Segredos do n8n.
#
# Substituir antes do deploy (NÃO commite valores reais):
#   kubectl -n n8n create secret generic n8n-secrets \
#     --from-literal=N8N_ENCRYPTION_KEY=$(openssl rand -hex 32) \
#     --from-literal=DB_POSTGRESDB_PASSWORD='<APP_N8N_PASSWORD do postgres-credentials>' \
#     --from-literal=QUEUE_BULL_REDIS_PASSWORD='<REDIS_PASSWORD do redis-credentials>' \
#     --from-literal=N8N_BASIC_AUTH_USER=admin \
#     --from-literal=N8N_BASIC_AUTH_PASSWORD=$(openssl rand -base64 24) \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
type: Opaque
stringData:
  N8N_ENCRYPTION_KEY: "CHANGE_ME_HEX_32_BYTES_FOR_N8N_ENCRYPTION"
  DB_POSTGRESDB_PASSWORD: "CHANGE_ME_APP_N8N_PASSWORD_FROM_POSTGRES"
  QUEUE_BULL_REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  N8N_BASIC_AUTH_USER: "admin"
  N8N_BASIC_AUTH_PASSWORD: "CHANGE_ME_N8N_UI_PASSWORD"
