# n8n main — UI/API e enfileiramento de jobs.
#
# Em modo queue, este processo:
#   - Serve a UI/API em :5678
#   - Persiste workflows/credentials no Postgres
#   - Enfileira execuções no Redis
#
# Em VPS pequena 1 réplica é suficiente. Como usa PVC ReadWriteOnce e
# preserva sessão local de runtime, mantemos `strategy: Recreate`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: main
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/component: main
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: main
        app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000        # uid `node`
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: n8nio/n8n:1.66.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secrets
          env:
            - name: N8N_PROCESS
              value: "main"
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 800m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
