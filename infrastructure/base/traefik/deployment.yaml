# Traefik 3.x como Ingress Controller.
#
# Pontos-chave:
# - SEM ACME interno: cert-manager é quem emite/renova certificados.
# - EntryPoints: web(:80), websecure(:443), traefik(:9000) p/ probe/dashboard,
#   metrics(:9100) p/ Prometheus.
# - Providers: KubernetesCRD (IngressRoute) + KubernetesIngress (para o
#   solver HTTP-01 do cert-manager funcionar).
# - allowCrossNamespace=true permite IngressRoute referenciar Middlewares
#   centralizados no namespace `traefik`.
#
# Recursos pequenos pensados para VPS 2vCPU/8GB (1 réplica em prod).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik
    app.kubernetes.io/component: ingress-controller
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
    app.kubernetes.io/managed-by: kustomize
spec:
  # Em VPS single-node mantemos 1 réplica. Overlay pode aumentar.
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
        app.kubernetes.io/instance: traefik
        app.kubernetes.io/component: ingress-controller
        app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: traefik
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          image: traefik:v3.2.3
          imagePullPolicy: IfNotPresent
          args:
            # ---- Log ----
            - --log.level=INFO
            - --accesslog=true
            - --accesslog.format=json
            - --accesslog.fields.defaultmode=keep
            - --accesslog.fields.headers.defaultmode=drop
            # ---- API / Dashboard ----
            # Dashboard exposto APENAS via IngressRoute autenticada.
            - --api=true
            - --api.dashboard=true
            - --api.insecure=false
            # ---- EntryPoints ----
            # web (:80) — SEM redirect no nível do entrypoint. O redirect
            # HTTP->HTTPS é feito por uma IngressRoute catch-all
            # (ingressroute-http-catchall.yaml) com middleware redirect-to-https.
            # Motivo: entrypoint-level redirect intercepta ANTES do roteamento e
            # quebra o solver HTTP-01 do cert-manager em /.well-known/acme-challenge/.
            - --entrypoints.web.address=:8000
            # websecure (:443) - TLS termination via Secret do cert-manager
            - --entrypoints.websecure.address=:8443
            - --entrypoints.websecure.http.tls=true
            # entrypoint interno para /ping e /dashboard (não exposto na borda)
            - --entrypoints.traefik.address=:9000
            # entrypoint Prometheus
            - --entrypoints.metrics.address=:9100
            # ---- Providers ----
            - --providers.kubernetescrd=true
            - --providers.kubernetescrd.allowCrossNamespace=true
            - --providers.kubernetescrd.allowExternalNameServices=true
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
            - --providers.kubernetesingress.allowExternalNameServices=true
            # ---- Métricas Prometheus ----
            - --metrics.prometheus=true
            - --metrics.prometheus.entrypoint=metrics
            - --metrics.prometheus.addrouterslabels=true
            # ---- Ping para health probes ----
            - --ping=true
            - --ping.entrypoint=traefik
            # ---- Global ----
            - --global.checknewversion=false
            - --global.sendanonymoususage=false
          ports:
            - name: web
              containerPort: 8000
              protocol: TCP
            - name: websecure
              containerPort: 8443
              protocol: TCP
            - name: traefik
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: traefik
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: traefik
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ping
              port: traefik
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
