# Placeholder do Secret de BasicAuth do dashboard do Traefik.
#
# NÃO commite o valor real. Crie via:
#   htpasswd -nbB admin 'SENHA' | base64 -w0
# e depois:
#   kubectl -n traefik create secret generic traefik-dashboard-auth \
#     --from-literal=users="$(htpasswd -nbB admin SENHA)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Ou utilize SealedSecrets / External Secrets em produção.
apiVersion: v1
kind: Secret
metadata:
  name: traefik-dashboard-auth
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
type: Opaque
stringData:
  # admin / CHANGE_ME — formato esperado pelo middleware BasicAuth do Traefik.
  # Use bcrypt (htpasswd -B). Substitua antes do deploy.
  users: "admin:$2y$05$DNRZtjp0uoduCROp8HwIju47mQdWMBuJKRK5jIqPqVZK8PbYjYLTG"
