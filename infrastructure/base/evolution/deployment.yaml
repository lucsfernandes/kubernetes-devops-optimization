# Deployment da Evolution API v2.3.7.
# Imagem oficial: evoapicloud/evolution-api
# (Renomeada da antiga `atendai/evolution-api` quando o projeto migrou para
#  a Evolution Foundation. As tags <= v2.2.x ainda estão em atendai/...,
#  mas v2.3.x+ é publicada exclusivamente em evoapicloud/.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evolution
  namespace: evolution
  labels:
    app.kubernetes.io/name: evolution
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate            # PVC ReadWriteOnce -> sem rolling
  selector:
    matchLabels:
      app.kubernetes.io/name: evolution
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evolution
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # InitContainer: a imagem oficial da Evolution API tem vários diretórios
      # owned por root (UID 0) que o entrypoint precisa REESCREVER em runtime:
      #   1. /evolution/prisma         -> cp ./prisma/<provider>-migrations
      #   2. /evolution/node_modules/.prisma/client -> npx prisma generate
      # Como o container principal roda como UID 1000, ele não consegue
      # escrever nessas pastas e o startup falha com "Permission denied".
      # Solução: copiar o conteúdo da imagem para emptyDirs, ajustar ownership
      # para 1000:1000, e remontar os emptyDirs nesses paths no container
      # principal — assim o app não-root tem write access.
      initContainers:
        - name: prepare-writable-dirs
          image: evoapicloud/evolution-api:v2.3.7
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # /evolution/prisma (migrations + schema)
              cp -a /evolution/prisma/. /staging-prisma/
              chown -R 1000:1000 /staging-prisma
              # /evolution/node_modules/.prisma (generated Prisma client)
              if [ -d /evolution/node_modules/.prisma ]; then
                cp -a /evolution/node_modules/.prisma/. /staging-node-prisma/
              fi
              chown -R 1000:1000 /staging-node-prisma
          securityContext:
            # Sobrescreve o runAsNonRoot/runAsUser do pod — precisamos de root
            # SÓ aqui para chown. Após o init, o pod volta a rodar como 1000.
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: prisma
              mountPath: /staging-prisma
            - name: node-prisma
              mountPath: /staging-node-prisma
      containers:
        - name: evolution
          image: evoapicloud/evolution-api:v2.3.7
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: evolution-config
            - secretRef:
                name: evolution-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /evolution/instances
            - name: store
              mountPath: /evolution/store
            - name: prisma
              mountPath: /evolution/prisma
            - name: node-prisma
              mountPath: /evolution/node_modules/.prisma
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: evolution-data
        - name: store
          emptyDir: {}
        - name: prisma
          emptyDir: {}
        - name: node-prisma
          emptyDir: {}
