apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: evolution
  namespace: evolution
  labels:
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
spec:
  secretName: evolution-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: evolution.example.com.br
  dnsNames:
    - evolution.example.com.br
