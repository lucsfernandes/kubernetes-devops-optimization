# Secrets da Evolution API v2.3.7 (imagem evoapicloud/evolution-api).
#
# AUTHENTICATION_API_KEY -> enviada pelo cliente no header `apikey` em TODAS
# as requisições. Gere com:
#   openssl rand -hex 32
#
# Substituir antes do deploy:
#   kubectl -n evolution create secret generic evolution-secrets \
#     --from-literal=AUTHENTICATION_API_KEY=$(openssl rand -hex 32) \
#     --from-literal=DATABASE_CONNECTION_URI='postgresql://evolution_user:<APP_EVOLUTION_PASSWORD>@postgres-rw.databases.svc.cluster.local:5432/evolution?schema=public' \
#     --from-literal=CACHE_REDIS_URI='redis://:<REDIS_PASSWORD>@redis.databases.svc.cluster.local:6379/1' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: evolution-secrets
  namespace: evolution
  labels:
    app.kubernetes.io/name: evolution
    app.kubernetes.io/part-of: <YOUR-ORGANIZATION-HERE>
type: Opaque
stringData:
  AUTHENTICATION_API_KEY: "$(openssl rand -hex 32)"
  DATABASE_CONNECTION_URI: "postgresql://evolution_user:<your-password-here>@postgres-rw.databases.svc.cluster.local:5432/evolution?schema=public"
  CACHE_REDIS_URI: "redis://:<your-redis-password-here>@redis.databases.svc.cluster.local:6379/1"
